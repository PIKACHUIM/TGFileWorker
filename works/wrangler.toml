name = "tgfileui-work"
main = "src/index.ts"
compatibility_date = "2024-07-25"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8789

[[d1_databases]]
binding = "DB"
database_name = "tgfileui-data"
database_id = "YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[[durable_objects.bindings]]
name = "WS_PROXY"
class_name = "WebSocketProxy"

[[durable_objects.bindings]]
name = "SESSION_GEN"
class_name = "SessionGenDO"

[[durable_objects.bindings]]
name = "TG_CLIENT"
class_name = "TGClientDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = []

[[migrations]]
tag = "v2"
new_sqlite_classes = ["WebSocketProxy", "SessionGenDO"]

[[migrations]]
tag = "v3"
new_classes = ["TGClientDO"]

[assets]
directory = "./dist-client"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[vars]
JWT_SECRET = "*******************************"
WORKER_URL = "https://your-worker.workers.dev"
HASH_LENGTH = "6"
